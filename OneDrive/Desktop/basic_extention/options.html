<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Settings - AI Summarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="blob-area">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container">
        <h1>Configuration</h1>
        <p class="description">Connect your engine to enable insights.</p>

        <div class="input-group">
            <label for="api-key">Groq API Key</label>
            <input type="password" id="api-key" placeholder="Paste your Groq API key here">
            <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 8px;">
                Get a free key (no card needed) at <a href="https://console.groq.com/keys" target="_blank"
                    style="color: var(--accent);">console.groq.com/keys</a>
            </p>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="save-btn" style="flex: 2;">Save Settings</button>
            <button id="test-btn" style="flex: 1; background: rgba(255,255,255,0.05);">Test</button>
        </div>

        <div id="status" class="status"></div>
    </div>
    <script src="options.js"></script>
</body>

</html>
